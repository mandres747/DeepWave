<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1b3d"/>
      <stop offset="50%" stop-color="#1E3C72"/>
      <stop offset="100%" stop-color="#2A5298"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8E6CF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#A8E6CF" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#A8E6CF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A8E6CF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Waveform lines -->
  <path d="M0,300 Q50,270 100,300 Q150,330 200,300 Q250,270 300,300 Q350,330 400,300 Q450,270 500,300 Q550,330 600,300 Q650,270 700,300 Q750,330 800,300 Q850,270 900,300 Q950,330 1024,300"
        fill="none" stroke="url(#wave)" stroke-width="2" opacity="0.4"/>
  <path d="M0,320 Q50,300 100,320 Q150,340 200,320 Q250,300 300,320 Q350,340 400,320 Q450,300 500,320 Q550,340 600,320 Q650,300 700,320 Q750,340 800,320 Q850,300 900,320 Q950,340 1024,320"
        fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.25"/>

  <!-- DeepWave icon (v9 design) -->
  <g transform="translate(437, 30) scale(1.4)">
    <!-- Outer halo arch -->
    <path d="M16,66 C16,34 32,20 54,20 C76,20 92,34 92,66"
          fill="none" stroke="#A8E6CF" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    <!-- Main headphone arch -->
    <path d="M20,66 C20,38 36,24 54,24 C72,24 88,38 88,66"
          fill="none" stroke="#A8E6CF" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- Concentric arcs -->
    <path d="M42,54 A12,12 0 0,0 66,54" fill="none" stroke="#A8E6CF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M32,54 A22,22 0 0,0 76,54" fill="none" stroke="#A8E6CF" stroke-width="1.8" stroke-linecap="round" opacity="0.38"/>
    <path d="M20,54 A34,34 0 0,0 88,54" fill="none" stroke="#A8E6CF" stroke-width="1.2" stroke-linecap="round" opacity="0.2"/>
    <!-- Ear cups -->
    <rect x="12" y="58" width="14" height="30" rx="7" fill="#A8E6CF" opacity="0.85"/>
    <rect x="82" y="58" width="14" height="30" rx="7" fill="#A8E6CF" opacity="0.85"/>
  </g>

  <!-- App name -->
  <text x="512" y="230" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="bold" fill="white">
    DeepWave
  </text>

  <!-- Subtitle -->
  <text x="512" y="270" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#A8E6CF" letter-spacing="4">
    BINAURAL BEATS
  </text>

  <!-- Feature tags -->
  <g transform="translate(512, 370)" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" fill-opacity="0.7">
    <text x="-300" y="0">😴 Sleep</text>
    <text x="-150" y="0">🎯 Focus</text>
    <text x="0" y="0">🧘 Meditation</text>
    <text x="150" y="0">⚡ Energy</text>
    <text x="300" y="0">🔔 Solfeggio</text>
  </g>

  <!-- Bottom tagline -->
  <text x="512" y="450" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" fill-opacity="0.4" letter-spacing="2">
    OFFLINE · NO ADS · NO TRACKING · OPEN SOURCE
  </text>
</svg>
