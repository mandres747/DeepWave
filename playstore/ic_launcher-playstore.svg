<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162d5a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="100%" stop-color="#6BC5A0"/>
    </linearGradient>
  </defs>
  <rect width="108" height="108" rx="24" fill="url(#bg)"/>

  <!-- Outer halo arch -->
  <path d="M16,66 C16,34 32,20 54,20 C76,20 92,34 92,66"
        fill="none" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" opacity="0.2"/>

  <!-- Main headphone arch -->
  <path d="M20,66 C20,38 36,24 54,24 C72,24 88,38 88,66"
        fill="none" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>

  <!-- Concentric arcs (before ear cups). Center y=54, largest reaches y=88. -->
  <path d="M42,54 A12,12 0 0,0 66,54"
        fill="none" stroke="#A8E6CF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M32,54 A22,22 0 0,0 76,54"
        fill="none" stroke="#A8E6CF" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
  <path d="M20,54 A34,34 0 0,0 88,54"
        fill="none" stroke="#A8E6CF" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Left ear cup -->
  <rect x="12" y="58" width="14" height="30" rx="7" fill="#A8E6CF"/>
  <!-- Right ear cup -->
  <rect x="82" y="58" width="14" height="30" rx="7" fill="#A8E6CF"/>
</svg>
